name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Dalamud.FullscreenCutscenes.sln

      - name: Build release
        run: dotnet build Dalamud.FullscreenCutscenes.sln --configuration Release --no-restore

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Dalamud.FullscreenCutscenes/bin/x64/Release/Dalamud.FullscreenCutscenes/latest.zip
          generate_release_notes: true
