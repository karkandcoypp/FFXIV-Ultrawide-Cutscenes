name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Dalamud development files
        shell: pwsh
        run: |
          $dalamudDirectory = Join-Path $env:APPDATA "XIVLauncher\addon\Hooks\dev"
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile "dalamud-latest.zip"
          New-Item -ItemType Directory -Path $dalamudDirectory -Force | Out-Null
          Expand-Archive -Path "dalamud-latest.zip" -DestinationPath $dalamudDirectory -Force

      - name: Restore dependencies
        run: dotnet restore Dalamud.FullscreenCutscenes.sln

      - name: Build release
        run: dotnet build Dalamud.FullscreenCutscenes.sln --configuration Release --no-restore

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Dalamud.FullscreenCutscenes/bin/x64/Release/Dalamud.FullscreenCutscenes/latest.zip
          generate_release_notes: true
